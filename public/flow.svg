<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 236" width="900" height="236">
<defs>
<style>
  @keyframes dash{from{stroke-dashoffset:24;}to{stroke-dashoffset:0;}}
  @keyframes ownpay-glow{0%,100%{filter:drop-shadow(0 0 4px rgba(0,102,255,0.35));}50%{filter:drop-shadow(0 0 12px rgba(0,102,255,0.80));}}
  @keyframes success-glow{0%,100%{filter:drop-shadow(0 0 4px rgba(34,197,94,0.35));}50%{filter:drop-shadow(0 0 12px rgba(34,197,94,0.80));}}
  @keyframes gateway-glow{0%,100%{filter:drop-shadow(0 0 3px rgba(34,197,94,0.25));}50%{filter:drop-shadow(0 0 8px rgba(34,197,94,0.60));}}
  .a1{stroke-dasharray:8 4;animation:dash 0.7s linear infinite;}
  .a2{stroke-dasharray:8 4;animation:dash 0.7s linear infinite 0.22s;}
  .a3{stroke-dasharray:8 4;animation:dash 0.7s linear infinite 0.44s;}
  .a4{stroke-dasharray:8 4;animation:dash 0.7s linear infinite 0.66s;}
  .ng1{animation:ownpay-glow 2.4s ease-in-out infinite;}
  .ng2{animation:ownpay-glow 2.4s ease-in-out infinite 1.2s;}
  .gg{animation:gateway-glow 2.4s ease-in-out infinite 0.8s;}
  .sg{animation:success-glow 2.4s ease-in-out infinite 1.8s;}
</style>
</defs>

<!-- BG -->
<rect width="900" height="236" rx="14" fill="#0D1117" stroke="#21262D" stroke-width="1"/>

<!-- Subtle grid lines in bg -->
<line x1="0" y1="118" x2="900" y2="118" stroke="#161B22" stroke-width="1"/>

<!-- Title -->
<text x="450" y="26" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="9.5" font-weight="600" letter-spacing="4" fill="#3D4D5E">HOW OWNPAY WORKS</text>

<!-- STEP NUMBERS -->
<text x="120" y="76" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="700" fill="#FFB800">01</text>
<text x="285" y="76" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="700" fill="#FFB800">02</text>
<text x="450" y="76" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="700" fill="#FFB800">03</text>
<text x="615" y="76" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="700" fill="#FFB800">04</text>
<text x="780" y="76" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="700" fill="#22C55E">05</text>

<!-- NODE 1: Merchant (start) -->
<rect x="60" y="85" width="120" height="56" rx="9" fill="#111820" stroke="#2D3748" stroke-width="1.5"/>
<text x="120" y="109" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="12" font-weight="600" fill="#C9D1D9">Merchant Site</text>
<text x="120" y="128" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="9.5" fill="#586474">Checkout Initiated</text>

<!-- NODE 2: OwnPay (request) -->
<g class="ng1">
  <rect x="225" y="85" width="120" height="56" rx="9" fill="#060D1F" stroke="#0066FF" stroke-width="1.5"/>
  <text x="285" y="109" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">OwnPay</text>
  <text x="285" y="128" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="9.5" fill="#4D8FFF">Processes Request</text>
</g>

<!-- NODE 3: Payment Gateway -->
<g class="gg">
  <rect x="390" y="85" width="120" height="56" rx="9" fill="#06130C" stroke="#22C55E" stroke-width="1.5"/>
  <text x="450" y="109" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="12" font-weight="600" fill="#C9D1D9">Gateway API</text>
  <text x="450" y="128" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="9.5" fill="#3DBA6A">Customer Pays</text>
</g>

<!-- NODE 4: OwnPay (confirm) -->
<g class="ng2">
  <rect x="555" y="85" width="120" height="56" rx="9" fill="#060D1F" stroke="#0066FF" stroke-width="1.5"/>
  <text x="615" y="109" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">OwnPay</text>
  <text x="615" y="128" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="9.5" fill="#4D8FFF">Confirms Payment</text>
</g>

<!-- NODE 5: Merchant (success) -->
<g class="sg">
  <rect x="720" y="85" width="120" height="56" rx="9" fill="#06130C" stroke="#22C55E" stroke-width="2"/>
  <text x="780" y="109" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="12" font-weight="600" fill="#C9D1D9">Merchant Site</text>
  <text x="780" y="128" text-anchor="middle" font-family="SF Pro Display,system-ui,sans-serif" font-size="9.5" fill="#3DBA6A">&#x2713; Payment Done</text>
</g>

<!-- ARROWS: animated dashes (line only, arrowhead separate) -->
<line x1="182" y1="113" x2="219" y2="113" stroke="#1A5FFF" stroke-width="1.5" class="a1"/>
<line x1="347" y1="113" x2="384" y2="113" stroke="#1A5FFF" stroke-width="1.5" class="a2"/>
<line x1="512" y1="113" x2="549" y2="113" stroke="#1A5FFF" stroke-width="1.5" class="a3"/>
<line x1="677" y1="113" x2="714" y2="113" stroke="#1A5FFF" stroke-width="1.5" class="a4"/>

<!-- ARROWHEADS (static) -->
<polygon points="219,109 219,117 228,113" fill="#0066FF"/>
<polygon points="384,109 384,117 393,113" fill="#0066FF"/>
<polygon points="549,109 549,117 558,113" fill="#0066FF"/>
<polygon points="714,109 714,117 723,113" fill="#0066FF"/>

<!-- TRAVELING DOTS (SMIL animation) -->
<circle r="3" cy="113" fill="#60A5FA" opacity="0">
  <animate attributeName="cx" from="182" to="219" dur="0.7s" repeatCount="indefinite" begin="0s"/>
  <animate attributeName="opacity" values="0;1;1;0" dur="0.7s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle r="3" cy="113" fill="#60A5FA" opacity="0">
  <animate attributeName="cx" from="347" to="384" dur="0.7s" repeatCount="indefinite" begin="0.22s"/>
  <animate attributeName="opacity" values="0;1;1;0" dur="0.7s" repeatCount="indefinite" begin="0.22s"/>
</circle>
<circle r="3" cy="113" fill="#60A5FA" opacity="0">
  <animate attributeName="cx" from="512" to="549" dur="0.7s" repeatCount="indefinite" begin="0.44s"/>
  <animate attributeName="opacity" values="0;1;1;0" dur="0.7s" repeatCount="indefinite" begin="0.44s"/>
</circle>
<circle r="3" cy="113" fill="#60A5FA" opacity="0">
  <animate attributeName="cx" from="677" to="714" dur="0.7s" repeatCount="indefinite" begin="0.66s"/>
  <animate attributeName="opacity" values="0;1;1;0" dur="0.7s" repeatCount="indefinite" begin="0.66s"/>
</circle>

<!-- LABEL BELOW ARROWS -->
<text x="200" y="155" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">checkout</text>
<text x="200" y="165" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">request</text>

<text x="365" y="155" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">gateway</text>
<text x="365" y="165" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">redirect</text>

<text x="530" y="155" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">payment</text>
<text x="530" y="165" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">callback</text>

<text x="695" y="155" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">success</text>
<text x="695" y="165" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="8.5" fill="#3A4654">redirect</text>

<!-- DIVIDER + FOOTER -->
<line x1="270" y1="192" x2="630" y2="192" stroke="#1C2333" stroke-width="1"/>
<text x="450" y="208" text-anchor="middle" font-family="SF Mono,Fira Code,monospace" font-size="9" fill="#2E3A48" letter-spacing="2">YOUR GATEWAY · YOUR SERVER · YOUR RULES</text>

<!-- OwnPay branding badge -->
<rect x="392" y="216" width="116" height="15" rx="4" fill="#060D1F" stroke="#0066FF22" stroke-width="1"/>
<text x="450" y="227" text-anchor="middle" font-family="SF Mono,monospace" font-size="8" font-weight="600" fill="#1A5FFF" letter-spacing="1">ownpay.org</text>

</svg>