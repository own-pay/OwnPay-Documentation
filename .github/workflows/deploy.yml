name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to learn.ownpay.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: ls -la .vitepress/dist

      - name: Deploy to server via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username:            ${{ secrets.DEPLOY_SSH_USER }}
          server:              ${{ secrets.DEPLOY_SSH_HOST }}
          port:                ${{ secrets.DEPLOY_SSH_PORT }}
          ssh_private_key:     ${{ secrets.DEPLOY_SSH_KEY }}
          local_path:          ./.vitepress/dist/
          remote_path:         ${{ secrets.DEPLOY_REMOTE_PATH }}
          delete_remote_files: true

      - name: Bust Nginx proxy_cache after deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:        ${{ secrets.DEPLOY_SSH_HOST }}
          port:        ${{ secrets.DEPLOY_SSH_PORT }}
          username:    ${{ secrets.DEPLOY_SSH_USER }}
          key:         ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # 1. Touch all HTML files - updates mtime so Nginx proxy_cache
            #    considers them stale and re-fetches from Apache on next request
            find ${{ secrets.DEPLOY_REMOTE_PATH }} -name "*.html" -exec touch {} \;
            echo "Touched all HTML files"

            # 2. Purge Nginx proxy_cache directories (common locations)
            #    Nginx stores proxy cache as files under the configured cache zone path
            for CACHE_DIR in /var/cache/nginx /tmp/nginx-cache /tmp/nginx /var/tmp/nginx; do
              if [ -d "$CACHE_DIR" ]; then
                find "$CACHE_DIR" -type f -delete 2>/dev/null && echo "Cleared Nginx cache: $CACHE_DIR" || true
              fi
            done

            echo "Deploy cache bust complete: $(date)"
