name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to learn.ownpay.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: ls -la .vitepress/dist

      - name: Deploy to server via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username:            ${{ secrets.DEPLOY_SSH_USER }}
          server:              ${{ secrets.DEPLOY_SSH_HOST }}
          port:                ${{ secrets.DEPLOY_SSH_PORT }}
          ssh_private_key:     ${{ secrets.DEPLOY_SSH_KEY }}
          local_path:          ./.vitepress/dist/
          remote_path:         ${{ secrets.DEPLOY_REMOTE_PATH }}
          delete_remote_files: true

      - name: Bust server-side cache after deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:        ${{ secrets.DEPLOY_SSH_HOST }}
          port:        ${{ secrets.DEPLOY_SSH_PORT }}
          username:    ${{ secrets.DEPLOY_SSH_USER }}
          key:         ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Touch all HTML files so their mtime changes - forces backend
            # caches (Nginx proxy_cache, LiteSpeed, Varnish) to re-validate
            find ${{ secrets.DEPLOY_REMOTE_PATH }} -name "*.html" -exec touch {} \;

            # Clear LiteSpeed page cache if it exists
            # LiteSpeed stores cached pages in a .lscache or lscache directory
            if [ -d "${{ secrets.DEPLOY_REMOTE_PATH }}/.lscache" ]; then
              rm -rf ${{ secrets.DEPLOY_REMOTE_PATH }}/.lscache/*
              echo "LiteSpeed .lscache cleared"
            fi
            if [ -d "${{ secrets.DEPLOY_REMOTE_PATH }}/lscache" ]; then
              rm -rf ${{ secrets.DEPLOY_REMOTE_PATH }}/lscache/*
              echo "LiteSpeed lscache cleared"
            fi

            echo "Cache bust complete: $(date)"
